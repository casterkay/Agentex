<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Agentex V1 Market View</title>
    <style>
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7f7f4;
        color: #171717;
      }
      main {
        max-width: 1120px;
        margin: 0 auto;
        padding: 32px 20px;
      }
      h1 {
        font-size: 28px;
        margin: 0 0 20px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        background: #fff;
        border: 1px solid #d9d9d2;
      }
      th,
      td {
        padding: 10px 12px;
        border-bottom: 1px solid #e8e8e2;
        text-align: left;
        font-size: 13px;
        vertical-align: top;
      }
      th {
        background: #ecece5;
        font-weight: 700;
      }
      code {
        word-break: break-all;
      }
      .muted {
        color: #666;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Agentex V1 Market View</h1>
      <p class="muted">Reads <code>demo/live-output/summary.json</code>, falling back to <code>demo/local-output/summary.json</code> for local rehearsals.</p>
      <table>
        <thead>
          <tr>
            <th>Leg</th>
            <th>Experience</th>
            <th>Attestation</th>
            <th>Listing</th>
            <th>Purchase</th>
            <th>Ingestion</th>
          </tr>
        </thead>
        <tbody id="rows">
          <tr><td colspan="6">Loading summary.json...</td></tr>
        </tbody>
      </table>
    </main>
    <script>
      async function loadSummary() {
        for (const candidate of ["live-output/summary.json", "local-output/summary.json"]) {
          try {
            const response = await fetch(candidate);
            if (response.ok) return response.json();
          } catch {}
        }
        throw new Error("summary.json not found");
      }

      loadSummary()
        .then((summary) => {
          const rows = document.getElementById("rows");
          rows.innerHTML = "";
          const round = summary.round || [];
          round.forEach((leg, index) => {
            const tr = document.createElement("tr");
            tr.innerHTML = `
              <td>${leg.buyer} buys ${leg.seller}</td>
              <td><code>${summary.experiences?.[index]?.experience_id || ""}</code></td>
              <td><code>${summary.attestations?.[index]?.attestation_id || ""}</code></td>
              <td><code>${summary.listings?.[index]?.listing_id || ""}</code></td>
              <td><code>${summary.purchases?.[index]?.purchase_id || ""}</code></td>
              <td><code>${summary.ingestions?.[index]?.path || ""}</code></td>
            `;
            rows.appendChild(tr);
          });
        })
        .catch((error) => {
          document.getElementById("rows").innerHTML = `<tr><td colspan="6">${error.message}</td></tr>`;
        });
    </script>
  </body>
</html>
