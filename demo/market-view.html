<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Agentex V1 Market View</title>
    <style>
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7f7f4;
        color: #171717;
      }
      main {
        max-width: 1120px;
        margin: 0 auto;
        padding: 32px 20px;
      }
      h1 {
        font-size: 28px;
        margin: 0 0 20px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        background: #fff;
        border: 1px solid #d9d9d2;
      }
      th,
      td {
        padding: 10px 12px;
        border-bottom: 1px solid #e8e8e2;
        text-align: left;
        font-size: 13px;
        vertical-align: top;
      }
      th {
        background: #ecece5;
        font-weight: 700;
      }
      code {
        word-break: break-all;
      }
      .muted {
        color: #666;
      }
      .table-wrap {
        overflow-x: auto;
      }
      .status {
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Agentex V1 Market View</h1>
      <p class="muted">Reads <code>demo/live-output/summary.json</code>, falling back to <code>demo/local-output/summary.json</code> for local rehearsals.</p>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Leg</th>
              <th>Trade Summary</th>
              <th>Encrypted CID</th>
              <th>Attestation</th>
              <th>Listing</th>
              <th>Purchase</th>
              <th>Verification</th>
              <th>Ingestion</th>
            </tr>
          </thead>
          <tbody id="rows">
            <tr><td colspan="8">Loading summary.json...</td></tr>
          </tbody>
        </table>
      </div>
    </main>
    <script>
      async function loadSummary() {
        for (const candidate of ["live-output/summary.json", "local-output/summary.json"]) {
          try {
            const response = await fetch(candidate);
            if (response.ok) return response.json();
          } catch {}
        }
        throw new Error("summary.json not found");
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function field(value) {
        return value ? `<code>${escapeHtml(value)}</code>` : '<span class="muted">missing</span>';
      }

      function tradeSummary(summary, index) {
        const listingSummary = summary.listings?.[index]?.public_trade_summary;
        const experienceSummary = summary.experiences?.[index]?.public_trade_summary;
        const item = listingSummary || experienceSummary || summary.experiences?.[index] || {};
        const trade_tx_hash = item.trade_tx_hash;
        const pair = item.pair;
        const side = item.side;
        const fill = item.fill_price;
        return [
          pair || side || fill ? `<span>${escapeHtml([pair, side, fill].filter(Boolean).join(" "))}</span>` : "",
          field(trade_tx_hash),
        ].filter(Boolean).join("<br />");
      }

      loadSummary()
        .then((summary) => {
          const rows = document.getElementById("rows");
          rows.innerHTML = "";
          const round = summary.round || [];
          round.forEach((leg, index) => {
            const listing = summary.listings?.[index] || {};
            const purchase = summary.purchases?.[index] || {};
            const experience = summary.experiences?.[index] || {};
            const attestation = summary.attestations?.[index] || {};
            const ingestion = summary.ingestions?.[index] || {};
            const encrypted_experience_cid =
              listing.encrypted_experience_cid || experience.encrypted_experience_cid || attestation.encrypted_experience_cid;
            const decryption_verification_result = purchase.decryption_verification_result?.status || purchase.decryption_verification_status;
            const tr = document.createElement("tr");
            tr.innerHTML = `
              <td>${escapeHtml(leg.buyer)} buys ${escapeHtml(leg.seller)}</td>
              <td>${tradeSummary(summary, index)}</td>
              <td>${field(encrypted_experience_cid)}</td>
              <td>${field(attestation.attestation_id)}</td>
              <td>${field(listing.listing_id)}</td>
              <td>${field(purchase.purchase_id)}</td>
              <td class="status">${escapeHtml(decryption_verification_result || "pending")}</td>
              <td>${field(ingestion.path || ingestion.ingestion_path)}</td>
            `;
            rows.appendChild(tr);
          });
        })
        .catch((error) => {
          document.getElementById("rows").innerHTML = `<tr><td colspan="8">${escapeHtml(error.message)}</td></tr>`;
        });
    </script>
  </body>
</html>
